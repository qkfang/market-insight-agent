name: 10 Deploy Infrastructure

on:
  push:
    branches: [main]
    paths:
      - "bicep/**"
  workflow_dispatch:
  schedule:
    # GitHub Actions cron runs in UTC and does not observe daylight saving.
    # Runs hourly from 7:00 AM to 6:00 PM Sydney during AEST (UTC+10).
    # 7 AM Sydney = 21:00 UTC (prev day) ... 6 PM Sydney = 08:00 UTC.
    # Note: during AEDT (UTC+11, Oct-Apr) the window shifts one hour later.
    - cron: "0 21-23,0-8 * * *"

permissions:
  contents: read

jobs:
  deploy-dev:
    runs-on: ubuntu-latest
    environment: dev
    steps:
      - uses: actions/checkout@v4

      - name: Azure CLI Login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

    #   - name: Create Resource Group
    #     run: az group create --name 'rg-market-insight' --location 'eastus2'

      - name: Deploy Bicep
        working-directory: bicep
        run: |
          az deployment group create \
            --name 'market-insight-dev' \
            --resource-group 'rg-market-insight' \
            --template-file './main.bicep' \
            --parameters './main.bicepparam' \
            baseName='mkti'
